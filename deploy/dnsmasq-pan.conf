# dnsmasq-pan.conf — DHCP for the Bluetooth-PAN link (Dice Tracker).
# Install:  sudo cp deploy/dnsmasq-pan.conf /etc/dnsmasq.d/pan.conf
#           sudo systemctl restart dnsmasq
#
# Hands the Surface Pro a 192.168.44.x lease when it joins the Pi's Bluetooth
# NAP, so Windows doesn't fall back to a flaky 169.254.x APIPA address. This is
# the key reliability step for a Windows PAN client.

# DHCP only — disable dnsmasq's DNS server so it can't clash with anything else
# on the Pi (avahi/systemd-resolved).
port=0

# Only serve the PAN bridge. bind-dynamic tolerates pan0 appearing after
# dnsmasq starts (the bridge is created by pan0.sh / bt-nap.service).
interface=pan0
bind-dynamic

# Small lease pool on the private PAN subnet.
dhcp-range=192.168.44.10,192.168.44.50,255.255.255.0,1h

# This is an isolated link to the Pi only: advertise NO gateway (option 3) and
# NO DNS (option 6) so the Surface keeps using its own internet (if any) and
# simply reaches the Pi at 192.168.44.1.
dhcp-option=3
dhcp-option=6
